<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Glass ID Maker</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Liquid Glass Background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Form Section -->
        <section class="glass-panel form-section">
            <h1>Create ID Card</h1>
            <form id="id-form">
                <div class="form-group">
                    <label for="student-name">Student Name</label>
                    <input type="text" id="student-name" placeholder="John Doe" required maxlength="25">
                </div>
                
                <div class="form-group">
                    <label for="roll-number">Roll Number / ID</label>
                    <input type="text" id="roll-number" placeholder="CS-2024-042" required maxlength="15">
                </div>

                <div class="form-group">
                    <label for="grade-select">Grade / Dept</label>
                    <select id="grade-select">
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Mechanical Eng.">Mechanical Eng.</option>
                        <option value="Business Admin">Business Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="photo-upload">Upload Photo</label>
                    <input type="file" id="photo-upload" accept="image/*">
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Enroll Student</button>
            </form>
        </section>

        <!-- Display Section (3D Card) -->
        <section class="display-section">
            <div class="card-container" id="card-container">
                <div class="id-card" id="id-card">
                    <!-- Standard header -->
                    <div class="card-header">
                        <div class="logo"><i class="fa-solid fa-feather-pointed"></i> ACADEMIA</div>
                        <div class="chip"></div>
                    </div>

                    <!-- Main body -->
                    <div class="card-body">
                        <div class="photo-container" id="photo-container">
                            <!-- Placeholder by default -->
                            <i class="fa-solid fa-user photo-placeholder" id="placeholder-icon"></i>
                            <img id="card-photo" src="" alt="" style="display: none;">
                        </div>
                        <div class="details">
                            <div class="role" id="card-grade">Computer Science</div>
                            <div class="name" id="card-name">Student Name</div>
                            <div class="field">ID: <span id="card-roll">CS-0000</span></div>
                            <div class="field">Issued: <span>Mar 2026</span></div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="card-footer">
                        <div class="system-details">SECURE DIGITAL ID // NF-74</div>
                        <div class="barcode"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Enrolled Students Section -->
    <section class="enrolled-section">
        <div class="glass-panel list-header">
            <h2>Enrolled Students</h2>
        </div>
        <div class="list-grid" id="students-grid">
            <!-- Dynamic items will be placed here -->
            <div class="student-item">
                <div class="item-photo"><i class="fa-solid fa-user"></i></div>
                <div class="item-info">
                    <div class="item-name">No students enrolled yet</div>
                    <div class="item-roll">Fill the form to begin</div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
